dataset_name: erbacher/LeanRank-data
project_name: ProofAtlas
random_seed: 42
use_huggingface: true
corpus:
  lean_version: unknown
  mathlib_commit: unknown
  extraction_pipeline: LeanRank Hugging Face dataset
  source_revision: erbacher/LeanRank-data
sample:
  unit: theorem
  total_theorems: 10000
  hf_source_rows: 350000
  total_rows: 60000
  small_debug_rows: 1000
  committed_demo_rows: 3000
split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
retrieval:
  top_k: [1, 5, 10]
similarity:
  theorem_top_k: 10
proof_techniques:
  max_labels_per_state: 5
  minimum_support: 1
embedding:
  backend: sentence_transformers
  model_name: BAAI/bge-base-en-v1.5
  device: cuda
  devices: [cuda:0, cuda:1, cuda:2, cuda:3, cuda:4, cuda:5, cuda:6]
  batch_size: 512
  query_prefix: "Represent this Lean proof state for retrieving useful premises: "
  passage_prefix: "Represent this Lean theorem or premise for retrieval: "
index:
  backend: auto
  metric: cosine
  n_neighbors: 100
  create_vector_index: false
  ef_construction: 200
  M: 16
  ef_search: 100
index_benchmark:
  split: train
  top_k: 10
  query_count: 100
  seed: 42
validation:
  max_schema_rows_per_table: 2000
evaluation:
  max_val_proof_states: 100
  max_val_theorems: 50
  max_test_proof_states: 100
  max_test_theorems: 50
  batch_size: 256
  use_gpu: true
  gpu_device: cuda:0
  case_study_limit: 0
  rerank_max_test_proof_states: 20
  rerank_candidate_k: 50
  rerank_candidate_k_values: [50, 100]
  candidate_pool_top_k: [50, 100]
  query_representation_diagnostic_examples: 50
